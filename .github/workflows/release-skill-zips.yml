name: Release skill ZIPs

# Builds one claude.ai-uploadable ZIP per skill.
#  - On a version tag push (v*) -> attaches the ZIPs to that GitHub Release so
#    web/desktop users can download-and-upload them in one click.
#  - On manual run -> uploads the ZIPs as a workflow artifact for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build per-skill ZIPs
        run: bash scripts/build-skill-zips.sh

      - name: Upload ZIPs as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-zips
          path: dist/*.zip

      - name: Attach ZIPs to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
